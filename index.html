<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Camera</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:1;
}

#petal-container{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:8;
}

.petal{
    position:absolute;
    top:-120px;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{

    0%{
        transform:
        translateX(0)
        translateY(-100px)
        rotate(0deg);
    }

    25%{
        transform:
        translateX(40px)
        translateY(25vh)
        rotate(90deg);
    }

    50%{
        transform:
        translateX(-30px)
        translateY(50vh)
        rotate(180deg);
    }

    75%{
        transform:
        translateX(50px)
        translateY(75vh)
        rotate(270deg);
    }

    100%{
        transform:
        translateX(-20px)
        translateY(120vh)
        rotate(360deg);
    }
}

#frame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
    z-index:10;
}

#start{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#start button{
    padding:18px 35px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:#ff4f81;
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,79,129,.5);
}
</style>
</head>

<body>

<div id="start">
    <button>🌹 Open Your Surprise 🌹</button>
</div>

<video id="video" autoplay playsinline muted></video>

<div id="petal-container"></div>

<img src="frame.png" id="frame" alt="frame">

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const music = document.getElementById("music");
const start = document.getElementById("start");

// Start Experience
start.onclick = async () => {

    try{

        await music.play();

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user"
            }
        });

        video.srcObject = stream;

        start.remove();

    }catch(err){

        alert("Please allow camera access.");

        console.log(err);

    }

};

// Infinite Petals
const container =
document.getElementById("petal-container");

function createPetal(){

    const petal =
    document.createElement("img");

    petal.src = "rose-petal.png";

    petal.className = "petal";

    const size =
    15 + Math.random() * 40;

    const duration =
    6 + Math.random() * 8;

    petal.style.left =
    Math.random() *
    window.innerWidth + "px";

    petal.style.width =
    size + "px";

    petal.style.opacity =
    0.5 + Math.random() * 0.5;

    petal.style.animationDuration =
    duration + "s";

    container.appendChild(petal);

    petal.addEventListener(
        "animationend",
        () => petal.remove()
    );

}

// Initial petals
for(let i=0;i<40;i++){
    setTimeout(createPetal,i*100);
}

// Endless rain
setInterval(()=>{

    createPetal();
    createPetal();
    createPetal();

},250);

</script>

</body>
</html>
