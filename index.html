<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#frame{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
z-index:10;
}

#start{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#start button{
padding:18px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4f81;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div id="start">
<button>🌹 Open Your Surprise 🌹</button>
</div>

<video id="video" autoplay playsinline muted></video>

<img src="frame.png" id="frame">

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const video=document.getElementById("video");
const music=document.getElementById("music");
const start=document.getElementById("start");

start.onclick=async()=>{

try{

await music.play();

const stream=
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
}
});

video.srcObject=stream;

start.remove();

}catch(err){

alert("Please allow camera and audio.");

}

};

</script>

</body>
</html>
